baseURL = "https://nothofagusdombeyis.com"
languageCode = "es"
title = "Nothofagus Dombeyis"
theme = "ananke"

# PaperMod / RSS expects this in many configs
[params]
  featured_image = "/images/background.JPG"
  background_color_class = "bg-forest-dark"
  custom_css = ["css/forest.css"]
  body_classes = "georgia bg-near-black"
  text_color = "near-white"
  post_content_classes = "serif"
  cover_dimming_class = "bg-black-30"
  author = "Ricardo Vivanco"
  MainSections = ["SobrePensar","Guías","sobre-mi","post","posts","Poemas"]
[params.assets]
  favicon = "favicon.ico"
  favicon16x16 = "favicon-16x16.png"
  favicon32x32 = "favicon-32x32.png"

[markup]
  [markup.goldmark.renderer]
    unsafe = true
  [markup.highlight]
    codeFences = true
    guessSyntax = true
    lineNos = true
    style = "monokai"

[menu]
  [[menu.main]]
    name = "SobrePensar"
    url = "/SobrePensar/"
    weight = 10
#  [[menu.main]]
#    name = "Guías"
#    url = "/Guias/"
#    weight = 20
  [[menu.main]]
    name = "Poemas"
    url = "/poemas/"
    weight = 20
  [[menu.main]]
    name = "Sobre mi"
    url = "/sobre-mi/"
    weight = 20

